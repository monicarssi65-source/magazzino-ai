function log(msg, cls='info'){
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.startMigration = async function(){
  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  log('Avvio migrazione ' + BOLLE.length + ' bolle su Firebase...', 'info');
  log('─────────────────────────────────', 'muted');
  let ok = 0, err = 0;
  for(let i=0; i<BOLLE.length; i++){
    const b = BOLLE[i];
    document.getElementById('progress').textContent = `Caricamento ${i+1}/${BOLLE.length} — ${b.num} (${b.fornitore.split(' ')[0]})`;
    try {
      await addDoc(collection(db, COLLECTION), b);
      log(`✓ [${i+1}/${BOLLE.length}] ${b.num} — ${b.fornitore.split(' ')[0]} — € ${b.totale}`, 'ok');
      ok++;
    } catch(e) {
      log(`✗ [${i+1}] ${b.num} — ERRORE: ${e.message}`, 'err');
      err++;
    }
    // Piccola pausa per non sovraccaricare Firestore
    await new Promise(r => setTimeout(r, 150));
  }
  log('─────────────────────────────────', 'muted');
  log(`✅ Migrazione completata: ${ok} bolle caricate, ${err} errori`, ok===BOLLE.length?'ok':'err');
  document.getElementById('progress').textContent = `✅ Completato: ${ok}/${BOLLE.length} bolle su Firebase`;
  if(ok > 0) {
    log('', 'muted');
    log('Ora apri MagazzinoAI — le bolle appariranno automaticamente!', 'info');
  }
}
