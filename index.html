<!DOCTYPE html>
<html lang="it">

<style>
:root{--gold:#C9A84C;--gold-l:#E8D5A3;--gold-d:#8B6914;--dark:#1A1410;--dark2:#2A2018;--dark3:#3A3028;--dark4:#221C14;--cream:#F5EDD8;--cream2:#EDE0C4;--text:#2A1F0E;--muted:#7A6A55;--brd:rgba(201,168,76,.25);--brd2:rgba(201,168,76,.55);--brd3:rgba(201,168,76,.12);--green:rgba(46,125,50,.15);--green-brd:rgba(46,125,50,.4);--green-txt:#81c784;--red:rgba(192,57,43,.15);--red-brd:rgba(192,57,43,.4);--red-txt:#e57373;--amber:rgba(201,168,76,.12);--amber-brd:rgba(201,168,76,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--dark);color:var(--cream);min-height:100vh;font-size:13px}
header{border-bottom:1px solid var(--brd);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;background:rgba(26,20,16,.97);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:.5rem}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:.08em;color:var(--gold)}
.brand em{font-style:italic;font-weight:600}
.brand-sub{font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.hnav{display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}

.nb:hover{color:var(--gold);border-color:var(--brd2)}
.nb.on{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.1)}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1.25rem 5rem}

.ptitle{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--gold);margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.steps{display:flex;border:1px solid var(--brd);border-radius:4px;overflow:hidden;margin-bottom:1.5rem}
.step{flex:1;padding:.6rem .4rem;text-align:center;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--brd);transition:all .3s}
.step:last-child{border-right:none}.step.on{background:rgba(201,168,76,.12);color:var(--gold)}.step.done{color:var(--gold-l);background:rgba(201,168,76,.06)}
input,select{background:var(--dark3);border:1px solid var(--brd);border-radius:3px;color:var(--cream);font-family:'DM Mono',monospace;font-size:.78rem;padding:.48rem .65rem;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus{border-color:var(--gold)}select option{background:var(--dark2)}
.btn{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;padding:.6rem 1.3rem;border-radius:3px;border:none;cursor:pointer;transition:all .22s;display:inline-flex;align-items:center;gap:.4rem;white-space:nowrap}
.btn-p{background:var(--gold);color:var(--dark);font-weight:500}.btn-p:hover{background:var(--gold-l)}.btn-p:disabled{opacity:.4;cursor:not-allowed}

.btn-d{background:transparent;color:var(--red-txt);border:1px solid rgba(192,57,43,.4)}.btn-d:hover{background:var(--red)}
.btn-sm{padding:.38rem .75rem;font-size:.55rem}.brow{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.uzone{border:2px dashed var(--brd2);border-radius:6px;padding:1.75rem;text-align:center;transition:all .3s;background:rgba(201,168,76,.02);margin-bottom:.85rem}
.uzone.drag{border-color:var(--gold);background:rgba(201,168,76,.06)}.uzone.has{border-color:var(--gold);background:rgba(201,168,76,.08)}
.uico{font-size:2.2rem;margin-bottom:.5rem;opacity:.65;display:block}
.utxt{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;color:var(--cream2);margin-bottom:.2rem}
.usub{font-size:.54rem;letter-spacing:.13em;color:var(--muted);text-transform:uppercase}
.ubtns{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;margin-top:.9rem}
.ubtn{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;padding:.52rem 1.1rem;border-radius:3px;cursor:pointer;transition:all .22s;display:inline-flex;align-items:center;gap:.4rem;background:transparent;color:var(--gold);border:1px solid var(--brd2)}
.ubtn:hover{background:rgba(201,168,76,.1)}.ubtn.pri{background:rgba(201,168,76,.15);color:var(--gold-l);border:1px solid var(--gold)}.ubtn.pri:hover{background:rgba(201,168,76,.25)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.5rem;margin-bottom:.85rem}

.pitem img{width:100%;height:100%;object-fit:cover}
.prmbtn{position:absolute;top:3px;right:3px;background:rgba(192,57,43,.9);border:none;border-radius:50%;color:#fff;font-size:.65rem;width:18px;height:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pbadge{position:absolute;bottom:3px;left:3px;background:rgba(26,20,16,.85);border-radius:3px;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-l);padding:2px 4px}
.aibox{display:none;align-items:center;gap:.9rem;background:rgba(201,168,76,.06);border:1px solid var(--brd);border-radius:4px;padding:.8rem 1.1rem;margin-bottom:.85rem}
.aibox.on{display:flex}.spin{width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}@keyframes spin{to{transform:rotate(360deg)}}

.bnr-ok{background:var(--green);border:1px solid var(--green-brd);color:var(--green-txt)}.bnr-warn{background:var(--amber);border:1px solid var(--amber-brd);color:var(--gold-l)}.bnr-err{background:var(--red);border:1px solid var(--red-brd);color:var(--red-txt)}

.rtable{width:100%;border-collapse:collapse;font-size:.72rem;margin-bottom:.75rem}

.rtable input,.rtable select{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--cream);font-family:'DM Mono',monospace;font-size:.72rem;padding:2px 3px;width:100%;min-width:40px;border-radius:0}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:.65rem;margin-bottom:1.1rem}
.met{background:var(--dark2);border:1px solid var(--brd);border-radius:5px;padding:.9rem 1rem}.ml{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.mv{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;color:var(--gold);letter-spacing:-.5px}.ms{font-size:.55rem;color:var(--muted);margin-top:.2rem}
.mdelta{font-size:.6rem;font-weight:500;margin-top:.2rem}.dup{color:#e57373}.ddn{color:#81c784}
.br-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.55rem}.br-lbl{min-width:110px;font-size:.65rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br-trk{flex:1;height:5px;background:rgba(201,168,76,.12);border-radius:3px;overflow:hidden}.br-fil{height:100%;border-radius:3px;transition:width .4s}
.br-val{min-width:72px;text-align:right;font-size:.65rem;font-weight:500;color:var(--cream2)}
.atable{width:100%;border-collapse:collapse;font-size:.72rem}
.atable th{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);padding:.5rem .7rem;text-align:left;border-bottom:1px solid var(--brd);white-space:nowrap}
.atable td{padding:.6rem .7rem;border-bottom:1px solid rgba(201,168,76,.08);color:var(--cream2);vertical-align:middle}.atable tr:hover td{background:rgba(201,168,76,.04)}
.tdc{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--gold);font-weight:600}.tdd{font-size:.62rem;color:var(--muted)}
.tdact{display:flex;gap:.3rem;flex-wrap:wrap}.tbtn{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.06em;padding:.22rem .5rem;border-radius:3px;border:1px solid var(--brd);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.tbtn:hover{color:var(--gold);border-color:var(--brd2)}.tbtn.d{color:rgba(231,76,60,.7)}.tbtn.d:hover{color:#e74c3c;border-color:rgba(231,76,60,.4)}
.price{background:rgba(46,125,50,.18);color:#81c784;padding:2px 7px;border-radius:3px;font-weight:500;font-size:.7rem;white-space:nowrap}
.tag{display:inline-block;font-size:.52rem;padding:2px 5px;border-radius:3px;background:rgba(201,168,76,.1);color:var(--gold-l);letter-spacing:.06em;white-space:nowrap}
.mchart{display:flex;align-items:flex-end;gap:4px;height:85px;margin-top:.5rem}.mb-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mb{width:100%;background:rgba(201,168,76,.12);border-radius:3px 3px 0 0;min-height:2px;border:1px solid var(--brd);transition:background .15s}.mb.cur{background:rgba(201,168,76,.45);border-color:var(--gold)}
.mb-l{font-size:.48rem;color:var(--muted);white-space:nowrap;letter-spacing:.05em}.mb-v{font-size:.48rem;color:var(--muted);font-weight:500}
.pvw{overflow-x:auto;margin-top:.5rem}.pvt{border-collapse:collapse;font-size:.65rem;min-width:100%}
.pvt th{background:var(--dark3);border:1px solid var(--brd);padding:5px 8px;font-size:.48rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);white-space:nowrap}
.pvt td{border:1px solid var(--brd);padding:5px 8px;text-align:right;white-space:nowrap;color:var(--cream2)}.pvt .rh{text-align:left;font-weight:500;background:var(--dark3);color:var(--cream)}
.pvt .tr td,.pvt .tc{background:rgba(201,168,76,.1);font-weight:700;color:var(--gold)}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}.empty-ico{font-size:2.5rem;margin-bottom:.75rem;opacity:.35;display:block}
.empty-t{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;margin-bottom:.3rem;color:var(--cream2)}.empty-s{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase}
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:1000;align-items:center;justify-content:center;padding:1rem}.mov.on{display:flex}
.mo{background:var(--dark2);border:1px solid var(--brd);border-radius:8px;max-width:440px;width:100%;padding:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mot{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--gold);margin-bottom:.5rem}.mob{font-size:.7rem;color:var(--muted);margin-bottom:1.25rem;line-height:1.6;letter-spacing:.03em}
.mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(26,20,16,.97);border-top:1px solid var(--brd);z-index:200;padding-bottom:env(safe-area-inset-bottom)}.mob-tabs{display:flex}
.mt{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 2px 5px;font-family:'DM Mono',monospace;font-size:.44rem;font-weight:400;color:var(--muted);cursor:pointer;border:none;background:none;text-transform:uppercase;letter-spacing:.25px;transition:color .12s}.mt .mi{font-size:19px;line-height:1.2}.mt.on{color:var(--gold)}
.status-bar{background:var(--dark3);border-bottom:1px solid var(--brd);padding:.3rem 1.5rem;font-size:.5rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;letter-spacing:.08em;text-transform:uppercase}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px}.status-dot.ok{background:#81c784}.status-dot.err{background:#e57373}.status-dot.wait{background:#ffb74d;animation:pulse 1s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:700px){.side-nav{display:none}.mob-bar{display:block}.wrap{padding:.85rem .85rem calc(68px + env(safe-area-inset-bottom))}.mgrid{grid-template-columns:repeat(2,1fr)}.ptitle{font-size:1rem}.atable{font-size:.65rem}.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}}.tw{overflow-x:auto}
</style>
</head>
<body>

<div class="status-bar">
  <span id="status-text"><span class="status-dot wait"></span> Caricamento dati in corso...</span>
  <span id="status-count"></span>
</div>

<div class="mov" id="modal">
  <div class="mo">
    <div class="mot" id="mod-t"></div>
    <div class="mob" id="mod-b"></div>
    <div class="brow">
      <button class="btn btn-d" id="mod-ok">Conferma</button>
      <button class="btn btn-o" onclick="closeModal()">Annulla</button>
    </div>
  </div>
</div>

<div class="mob-bar">
  <div class="mob-tabs">
    <button class="mt on" id="mt-dash" onclick="goV('dash')"><span class="mi">📊</span>Home</button>
    <button class="mt" id="mt-ann" onclick="goV('ann')"><span class="mi">📅</span>Anno</button>
    <button class="mt" id="mt-nuova" onclick="goV('nuova')"><span class="mi">📷</span>Bolla</button>
    <button class="mt" id="mt-bolle" onclick="goV('bolle')"><span class="mi">📋</span>Archivio</button>

  </div>
</div>

<header>
  <div>
    <div class="brand">Magazzino<em>AI</em></div>
    <div class="brand-sub">Gestione acquisti · Storage locale garantito</div>
  </div>
  <nav class="hnav side-nav">
    <button class="nb on" id="nb-dash" onclick="goV('dash')">📊 Dashboard</button>
    <button class="nb" id="nb-ann" onclick="goV('ann')">📅 Annuale</button>
    <button class="nb" id="nb-pivot" onclick="goV('pivot')">🔲 Pivot</button>
    <button class="nb" id="nb-nuova" onclick="goV('nuova')">📷 Carica Bolla</button>
    <button class="nb" id="nb-bolle" onclick="goV('bolle')">📋 Archivio</button>
    <button class="nb" id="nb-giac" onclick="goV('giac')">📦 Giacenze</button>
    <button class="nb" id="nb-anal" onclick="goV('anal')">📈 Incidenze</button>

<div class="wrap" id="main-wrap"></div>

<script>
'use strict';

// ═══════════════════════════════════
// STORAGE ENGINE: localStorage PRIMARIO
// ═══════════════════════════════════
const LS_KEY = 'magazzino_ai_bolle_v2';

function saveToLocalStorage() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(window.BOLLE));
    updateStatus(window.BOLLE.length, true);
  } catch(e) {
    updateStatus(window.BOLLE.length, false, 'Storage pieno');
  }
}

function loadFromLocalStorage() {
  try {
    const data = localStorage.getItem(LS_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      if (Array.isArray(parsed)) return parsed;
    }
  } catch(e) {}
  return [];
}

function updateStatus(count, ok, msg) {
  const el = document.getElementById('status-text');
  const cnt = document.getElementById('status-count');
  if (ok) {
    el.innerHTML = '<span class="status-dot ok"></span> Dati salvati localmente';
  } else {
    el.innerHTML = '<span class="status-dot err"></span> ' + (msg || 'Errore salvataggio');
  }
  cnt.textContent = count > 0 ? count + ' bolle' : '';
}

// ═══════════════════════════════════
// DATI
// ═══════════════════════════════════
window.BOLLE = loadFromLocalStorage();
const FCOLS=['#C9A84C','#E8D5A3','#81c784','#64b5f6','#e57373','#ba68c8','#4db6ac','#ffb74d','#a1887f','#90a4ae'];
const CCOLS=['#C9A84C','#81c784','#64b5f6','#e57373','#ba68c8','#4db6ac','#ffb74d','#a1887f','#f06292','#aed581'];
const MESI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const MSH=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const CATS=['Pesce','Carni Bovine','Carni Suine','Salumi','Formaggi','Latticini','Uova','Verdura fresca','Frutta fresca','Frutta secca','Pasta secca','Pasta fresca','Riso','Drogheria','Conserve','Surgelati','Bevande','Caffè','Dolciario','Erbe aromatiche','Non alimentare','Altro'];

const _fc={},_cc={};
function fCol(f){if(!_fc[f])_fc[f]=FCOLS[Object.keys(_fc).length%FCOLS.length];return _fc[f]}
function cCol(c){if(!_cc[c])_cc[c]=CCOLS[Object.keys(_cc).length%CCOLS.length];return _cc[c]}

let dashMode='m', imgs=[], aiRighe=[], aiDoc={};

const fmt=n=>parseFloat(n||0).toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN=n=>parseFloat(n||0).toLocaleString('it-IT',{minimumFractionDigits:0,maximumFractionDigits:3});
const fmtP=n=>parseFloat(n||0).toFixed(1)+'%';
const sumV=(arr,k)=>arr.reduce((s,i)=>s+(parseFloat(i[k])||0),0);
const grp=(arr,k)=>arr.reduce((a,i)=>{(a[i[k]]=a[i[k]]||[]).push(i);return a},{});
const allR=()=>BOLLE.flatMap(b=>b.righe.map(r=>({...r,fornitore:b.fornitore,year:b.year,month:b.month,bolla:b.num,data:b.data})));
const allF=()=>[...new Set(BOLLE.map(b=>b.fornitore))].sort();
const allC=()=>[...new Set(allR().map(r=>r.cat))].sort();
const getYY=()=>{const yy=[...new Set(BOLLE.map(b=>b.year))].sort();return yy.length?yy:[new Date().getFullYear()]};
function fR(year,month){let R=allR();if(year)R=R.filter(r=>r.year==year);if(month!==''&&month!=null)R=R.filter(r=>r.month==month);return R}
function fB(year,month,for_){let B=BOLLE;if(year)B=B.filter(b=>b.year==year);if(month!==''&&month!=null)B=B.filter(b=>b.month==month);if(for_)B=B.filter(b=>b.fornitore===for_);return B}

function fillY(id,cb,addAll=false){
  const s=document.getElementById(id);if(!s)return;
  const p=s.value;while(s.options.length)s.remove(0);
  if(addAll){const o=document.createElement('option');o.value='';o.textContent='Tutti gli anni';s.appendChild(o)}
  getYY().forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;s.appendChild(o)});
  if(p&&[...s.options].some(o=>o.value==p))s.value=p;else s.value=s.options[s.options.length-1]?.value||'';
  if(cb)s.onchange=cb;
}
function fillM(id,cb,year,addAll=true){
  const s=document.getElementById(id);if(!s)return;
  const p=s.value;while(s.options.length)s.remove(0);
  if(addAll){const o=document.createElement('option');o.value='';o.textContent='Tutti i mesi';s.appendChild(o)}
  const mm=[...new Set(BOLLE.filter(b=>!year||b.year==year).map(b=>b.month))].sort((a,b)=>a-b);
  mm.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=MESI[m-1];s.appendChild(o)});
  if(p&&[...s.options].some(o=>o.value==p))s.value=p;
  if(cb)s.onchange=cb;
}
function fillF(id){
  const s=document.getElementById(id);if(!s)return;
  const p=s.value;while(s.options.length>1)s.remove(1);
  allF().forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;s.appendChild(o)});
  if(p)s.value=p;
}
function fillC(id){

    const nb=document.getElementById('nb-'+v);if(nb)nb.classList.toggle('on',v===id);

  });
  if(id==='dash'){fillY('d-year',renderDash);fillM('d-month',renderDash,document.getElementById('d-year')?.value);renderDash()}
  if(id==='ann'){fillY('a-year',renderAnn);renderAnn()}
  if(id==='pivot'){fillY('pv-year',renderPivot);renderPivot()}
  if(id==='nuova')initNuova();
  if(id==='bolle'){fillY('b-year',renderBolle,true);fillM('b-month',renderBolle,'',true);fillF('b-for');renderBolle()}
  if(id==='giac'){fillY('g-year',renderGiac,true);fillM('g-month',renderGiac,'',true);fillC('g-cat');renderGiac()}
  if(id==='anal'){fillY('an-year',renderAnal,true);fillM('an-month',renderAnal,'',true);fillC('an-fcat');renderAnal()}
}

  const fT=Object.entries(grp(R,'fornitore')).map(([f,rr])=>({f,v:sumV(rr,'val')})).sort((a,b)=>b.v-a.v);

  const cT=Object.entries(grp(R,'cat')).map(([c,rr])=>({c,v:sumV(rr,'val')})).sort((a,b)=>b.v-a.v).slice(0,10);
  const mxC=cT[0]?.v||1;

  document.getElementById('d-recent').innerHTML=B.slice().sort((a,b)=>b.data.localeCompare(a.data)).slice(0,8).map(b=>{const c=fCol(b.fornitore);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:.65rem 0;border-bottom:1px solid var(--brd)"><span><strong style="color:var(--cream)">${b.num}</strong> <span style="color:var(--muted);font-size:.6rem">${b.data}</span><br><span style="color:${c}">${b.fornitore}</span></span><span class="price">€ ${fmt(b.totale)}</span></div>`}).join('')||'<div style="color:var(--muted);padding:.5rem 0">Nessuna bolla nel periodo.</div>';
}

function renderAnn(){
  const year=document.getElementById('a-year')?.value||'';
  const B=fB(year,'',''),R=fR(year,''),T=sumV(R,'val'),nA=new Set(R.map(r=>r.mat)).size;
  if(!B.length){document.getElementById('a-empty').style.display='';document.getElementById('a-body').style.display='none';return}
  document.getElementById('a-empty').style.display='none';document.getElementById('a-body').style.display='';
  document.getElementById('a-met').innerHTML=`<div class="met"><div class="ml">Totale anno ${year}</div><div class="mv">€ ${fmt(T)}</div><div class="ms">${B.length} bolle</div></div><div class="met"><div class="ml">Media mensile</div><div class="mv">€ ${fmt(B.length?T/12:0)}</div></div><div class="met"><div class="ml">Articoli distinti</div><div class="mv">${nA}</div></div>`;
  const byM=[];for(let m=1;m<=12;m++){const rm=R.filter(r=>r.month===m);byM.push({m,tot:sumV(rm,'val'),n:B.filter(b=>b.month===m).length})}
  const mxM=Math.max(...byM.map(m=>m.tot),1);
  document.getElementById('a-chart').innerHTML=`<div class="mchart">${byM.map(m=>{const h=m.tot>0?Math.max(Math.round(m.tot/mxM*100),5):0;return`<div class="mb-w"><div class="mb-v">${m.tot>0?'€'+Math.round(m.tot/1000)+'k':''}</div><div class="mb${m.n?' cur':''}" style="height:${h}%"></div><div class="mb-l">${MSH[m.m-1]}</div></div>`}).join('')}</div>`;
  document.getElementById('a-tbody').innerHTML=byM.map(m=>`<tr><td>${MESI[m.m-1]}</td><td>${m.n||'-'}</td><td>${m.n||'-'}</td><td>${m.tot>0?'€ '+fmt(m.tot):'-'}</td><td>-</td><td>${m.tot>0?fmtP(T?m.tot/T*100:0):'-'}</td></tr>`).join('');
  document.getElementById('a-tfoot').innerHTML=`<tr style="color:var(--gold)"><td>TOTALE</td><td>${B.length}</td><td>${nA}</td><td>€ ${fmt(T)}</td><td>-</td><td>100%</td></tr>`;
}

// ═══════════════════════════════════
// PIVOT
// ═══════════════════════════════════
function renderPivot(){
  const year=document.getElementById('pv-year')?.value||'';
  const rk=document.getElementById('pv-rows')?.value||'fornitore';
  const ck=document.getElementById('pv-cols')?.value||'month';
  const R=fR(year,'');
  if(!R.length){document.getElementById('pv-empty').style.display='';document.getElementById('pv-body').style.display='none';return}
  document.getElementById('pv-empty').style.display='none';document.getElementById('pv-body').style.display='';
  const rV=rk==='fornitore'?allF():allC();
  let cV=ck==='month'?[...new Set(R.map(r=>r.month))].sort((a,b)=>a-b).map(m=>({k:m,l:MSH[m-1]})):ck==='fornitore'?allF().map(f=>({k:f,l:f.split(' ')[0]})):allC().map(c=>({k:c,l:c}));
  const mx={},cT={},tot={v:0};rV.forEach(rv=>{mx[rv]={_t:0};cV.forEach(cv=>mx[rv][cv.k]=0)});cV.forEach(cv=>cT[cv.k]=0);
  R.forEach(r=>{const rv=rk==='fornitore'?r.fornitore:r.cat;const ck2=ck==='month'?r.month:ck==='fornitore'?r.fornitore:r.cat;if(mx[rv]&&cT[ck2]!==undefined){mx[rv][ck2]+=r.val;mx[rv]._t+=r.val;cT[ck2]+=r.val;tot.v+=r.val}});
  function build(pct){let h=`<table class="pvt"><thead><tr><th>${rk==='fornitore'?'Fornitore':'Categoria'}</th>`;cV.forEach(cv=>h+=`<th>${cv.l}</th>`);h+='<th class="tc">TOTALE</th></tr></thead><tbody>';
    rV.forEach(rv=>{h+=`<tr><td class="rh">${rv}</td>`;cV.forEach(cv=>{const v=mx[rv][cv.k]||0;h+=`<td>${pct?(tot.v?fmtP(v/tot.v*100):'-'):(v?'€ '+fmt(v):'-')}</td>`});h+=`<td class="tc">${pct?(tot.v?fmtP(mx[rv]._t/tot.v*100):'-'):'€ '+fmt(mx[rv]._t)}</td></tr>`});
    h+='<tr class="tr"><td class="rh">TOTALE</td>';cV.forEach(cv=>{const v=cT[cv.k]||0;h+=`<td>${pct?(tot.v?fmtP(v/tot.v*100):'-'):'€ '+fmt(v)}</td>`});h+=`<td>${pct?'100%':'€ '+fmt(tot.v)}</td></tr></tbody></table>`;return h}
  document.getElementById('pv-t').textContent=`Valori € - ${year||'tutti'}`;
  document.getElementById('pv-tbl').innerHTML=build(false);
  document.getElementById('pv-pct').innerHTML=build(true);
}

function initNuova(){stepUI(1)}
function stepUI(n){[1,3,4].forEach(i=>{const el=document.getElementById('step'+i);if(el)el.style.display=i===n?'':'none'});[1,2,3,4].forEach(i=>{const s=document.getElementById('st'+i);if(!s)return;s.classList.remove('on','done');if(i<n)s.classList.add('done');else if(i===n)s.classList.add('on')})}
function doFiles(files){Array.from(files).forEach(f=>{if(imgs.length>=4)return;const r=new FileReader();r.onload=ev=>{imgs.push({file:f,url:ev.target.result,base64:ev.target.result.split(',')[1],mime:f.type||'image/jpeg'});renderPreviews();checkReady()};r.readAsDataURL(f)})}
function renderPreviews(){const pg=document.getElementById('pgrid');if(!pg)return;pg.innerHTML='';imgs.forEach((img,i)=>{const d=document.createElement('div');d.className='pitem';if(img.mime.startsWith('image/')){d.innerHTML=`<img src="${img.url}"><button class="prmbtn" onclick="rmImg(${i})">×</button><div class="pbadge">Doc ${i+1}</div>`}else{d.innerHTML=`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--gold)">📄 PDF</div><button class="prmbtn" onclick="rmImg(${i})">×</button>`}pg.appendChild(d)});const uz=document.getElementById('uzone');if(imgs.length>0){uz.classList.add('has');document.getElementById('uico').textContent='✅';document.getElementById('utxt').textContent=imgs.length+' file pronto'}else{uz.classList.remove('has');document.getElementById('uico').textContent='🪪';document.getElementById('utxt').textContent='Foto o immagine della bolla'}}
function rmImg(i){imgs.splice(i,1);renderPreviews();checkReady()}
function checkReady(){const ready=imgs.length>0;document.getElementById('ai-btn').disabled=!ready}
function catOpts(sel){return CATS.map(c=>`<option ${c===sel?'selected':''}>${c}</option>`).join('')}
function renderVTable(){const tot=sumV(aiRighe,'val');document.getElementById('v-tot').textContent='€ '+fmt(tot)+' · '+aiRighe.length+' articoli';document.getElementById('v-tbody').innerHTML=aiRighe.map((r,i)=>`<tr><td><input value="${r.mat}" onchange="upd(${i},'mat',this.value)" style="min-width:170px"></td><td><select onchange="upd(${i},'cat',this.value)">${catOpts(r.cat)}</select></td><td><input type="number" value="${r.qty}" onchange="upd(${i},'qty',+this.value)" style="width:60px"></td><td><input value="${r.unit}" onchange="upd(${i},'unit',this.value)" style="width:44px"></td><td><input type="number" value="${r.price}" onchange="upd(${i},'price',+this.value)" style="width:75px"></td><td style="color:var(--gold);font-weight:500">€ ${fmt(r.val)}</td><td style="font-size:.6rem;color:var(--muted)">${r.note||''}</td><td><button class="tbtn d" onclick="delR(${i})">✕</button></td></tr>`).join('')}
function upd(i,k,v){aiRighe[i][k]=v;if(k==='qty'||k==='price')aiRighe[i].val=parseFloat((aiRighe[i].qty*aiRighe[i].price).toFixed(4));renderVTable()}
function delR(i){aiRighe.splice(i,1);renderVTable()}
function addRigaVuota(){aiRighe.push({mat:'',cat:'Altro',qty:1,unit:'PZ',price:0,val:0,note:''});renderVTable()}
function backTo1(){stepUI(1)}
function resetAll(){aiRighe=[];aiDoc={};imgs=[];document.getElementById('pgrid').innerHTML='';document.getElementById('uzone').classList.remove('has');document.getElementById('uico').textContent='🪪';document.getElementById('utxt').textContent='Foto o immagine della bolla';document.getElementById('ai-btn').disabled=true;stepUI(1)}

async function doAI(){
  document.getElementById('ai-btn').disabled=true;document.getElementById('aibox').classList.add('on');document.getElementById('ai-msg').textContent='Lettura documento…';
  const ca=[];imgs.forEach(img=>{if(img.mime==='application/pdf'){ca.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:img.base64}})}else{ca.push({type:'image',source:{type:'base64',media_type:img.mime,data:img.base64}})}});
  ca.push({type:'text',text:`Analizza questo documento di trasporto/DDT e restituisci SOLO JSON valido: {"num_documento":"","data":"YYYY-MM-DD","fornitore":"","righe":[{"mat":"","cat":"","qty":0,"unit":"","price":0,"val":0,"note":""}],"totale":0,"anomalie":[],"note_generali":""}. Categorie possibili: ${CATS.join(', ')}`});
  try{
    const res=await fetch('https://hotel-derby-proxy.monicarssi65.workers.dev',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:ca}]})});
    const data=await res.json();if(!res.ok||data.error)throw new Error(data.error?.message||'Errore API');
    const txt=data.content.map(b=>b.text||'').join('').replace(/```json\s*|```\s*/g,'').trim();
    let parsed;try{parsed=JSON.parse(txt)}catch(_){const m=txt.match(/\{[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);else throw new Error('JSON non valido')}
    aiDoc=parsed;aiRighe=parsed.righe.map((r,i)=>({...r,_i:i}));
    document.getElementById('aibox').classList.remove('on');stepUI(3);
    document.getElementById('doc-info').innerHTML=`<div class="doc-f"><label>N. Documento</label><input id="v-num" value="${parsed.num_documento||''}"></div><div class="doc-f"><label>Data</label><input id="v-data" type="date" value="${parsed.data||''}"></div><div class="doc-f"><label>Fornitore</label><input id="v-for" value="${parsed.fornitore||''}"></div><div class="doc-f"><label>Totale</label><div style="font-size:1.4rem;color:var(--gold)">€ ${fmt(parsed.totale)}</div></div>`;
    document.getElementById('ai-note').innerHTML=parsed.note_generali?`<div class="bnr bnr-warn on">💬 ${parsed.note_generali}</div>`:'';
    document.getElementById('ai-anom').innerHTML=(parsed.anomalie||[]).length?parsed.anomalie.map(a=>`<div class="bnr bnr-warn on">⚠️ ${a}</div>`).join(''):'<div class="bnr bnr-ok on">✅ Nessuna anomalia</div>';
    renderVTable();
  }catch(err){document.getElementById('aibox').classList.remove('on');document.getElementById('ai-btn').disabled=false;alert('Errore AI: '+err.message)}
}

function confirmSave(){
  const num=document.getElementById('v-num')?.value.trim();
  const dataStr=document.getElementById('v-data')?.value;
  const fornitore=document.getElementById('v-for')?.value.trim();
  if(!num||!dataStr||!fornitore||!aiRighe.length){alert('Compila tutti i campi');return}
  const d=new Date(dataStr);const totale=parseFloat(sumV(aiRighe,'val').toFixed(2));
  const bolla={num,data:dataStr,fornitore,year:d.getFullYear(),month:d.getMonth()+1,totale,fonte:'AI',righe:aiRighe.map(r=>({mat:r.mat,cat:r.cat,qty:r.qty,unit:r.unit,price:r.price,val:r.val}))};
  BOLLE.push(bolla);
  saveToLocalStorage();
  stepUI(4);
  document.getElementById('ok-msg').textContent='✅ Bolla '+num+' - '+fornitore+' - € '+fmt(totale)+' salvata!';
  aiRighe=[];
}

// ═══════════════════════════════════
// ARCHIVIO BOLLE
// ═══════════════════════════════════
function renderBolle(){
  fillY('b-year',renderBolle,true);const year=document.getElementById('b-year')?.value||'';fillM('b-month',renderBolle,year,true);fillF('b-for');
  const month=document.getElementById('b-month')?.value;const for_=document.getElementById('b-for')?.value||'';
  const B=fB(year,month,for_).sort((a,b)=>b.data.localeCompare(a.data));
  if(!BOLLE.length){document.getElementById('b-empty').style.display='';document.getElementById('b-panel').style.display='none';return}
  document.getElementById('b-empty').style.display='none';document.getElementById('b-panel').style.display='';
  document.getElementById('b-cnt').textContent=B.length+' bolle';document.getElementById('b-tot').innerHTML='<span class="price">€ '+fmt(sumV(B,'totale'))+'</span>';
  document.getElementById('b-tbody').innerHTML=B.map(b=>{const idx=BOLLE.indexOf(b);return`<tr><td class="tdc">${b.num}</td><td class="tdd">${b.data}</td><td style="color:${fCol(b.fornitore)}">${b.fornitore}</td><td>${b.righe.length} art.</td><td><span class="price">€ ${fmt(b.totale)}</span></td><td><span class="tag">${b.fonte}</span></td><td class="tdact"><button class="tbtn d" onclick="delB(${idx})">🗑</button></td></tr>`}).join('')||'<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:2rem">Nessuna bolla per questo filtro.</td></tr>';
}
function delB(idx){if(!confirm('Eliminare questa bolla?'))return;BOLLE.splice(idx,1);saveToLocalStorage();renderBolle()}

// ═══════════════════════════════════
// GIACENZE
// ═══════════════════════════════════
function renderGiac(){
  fillY('g-year',renderGiac,true);const year=document.getElementById('g-year')?.value||'';fillM('g-month',renderGiac,year,true);fillC('g-cat');
  const month=document.getElementById('g-month')?.value;const cat=document.getElementById('g-cat')?.value||'';const ord=document.getElementById('g-ord')?.value||'val';
  let R=fR(year,month);if(cat)R=R.filter(r=>r.cat===cat);
  if(!allR().length){document.getElementById('g-empty').style.display='';document.getElementById('g-panel').style.display='none';return}
  document.getElementById('g-empty').style.display='none';document.getElementById('g-panel').style.display='';
  const byM=grp(R,'mat');let rows=Object.entries(byM).map(([mat,rr])=>({mat,cat:rr[0].cat,unit:rr[0].unit,fornitore:rr[0].fornitore,qty:sumV(rr,'qty'),pm:sumV(rr,'price')/rr.length,val:sumV(rr,'val')}));
  if(ord==='val')rows.sort((a,b)=>b.val-a.val);else if(ord==='mat')rows.sort((a,b)=>a.mat.localeCompare(b.mat));else rows.sort((a,b)=>a.cat.localeCompare(b.cat)||b.val-a.val);
  const tot=sumV(rows,'val'),T=sumV(fR(year,month),'val');
  document.getElementById('g-sum').textContent=rows.length+' articoli · Totale € '+fmt(tot);
  document.getElementById('g-tbody').innerHTML=rows.map(r=>`<tr><td>${r.mat}</td><td><span class="tag">${r.cat}</span></td><td>${fmtN(r.qty)}</td><td>${r.unit}</td><td>€ ${fmt(r.pm)}</td><td style="color:var(--gold)">€ ${fmt(r.val)}</td><td><span class="tag">${fmtP(T?r.val/T*100:0)}</span></td><td>${r.fornitore.split(' ')[0]}</td></tr>`).join('');
  document.getElementById('g-tfoot').innerHTML=`<tr style="color:var(--gold)"><td colspan="5">TOTALE</td><td>€ ${fmt(tot)}</td><td>${fmtP(T?tot/T*100:100)}</td><td></td></tr>`;
}

// ═══════════════════════════════════
// ANALISI
// ═══════════════════════════════════
function renderAnal(){
  fillY('an-year',renderAnal,true);const year=document.getElementById('an-year')?.value||'';fillM('an-month',renderAnal,year,true);fillC('an-fcat');
  const month=document.getElementById('an-month')?.value;const R=fR(year,month),T=sumV(R,'val');
  if(!R.length){document.getElementById('an-empty').style.display='';document.getElementById('an-body').style.display='none';return}
  document.getElementById('an-empty').style.display='none';document.getElementById('an-body').style.display='';
  const fR2=Object.entries(grp(R,'fornitore')).map(([f,rr])=>({f,v:sumV(rr,'val')})).sort((a,b)=>b.v-a.v);
  const mxF=fR2[0]?.v||1;
  document.getElementById('an-for').innerHTML=fR2.map(({f,v})=>{return`<div style="margin-bottom:.85rem"><div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:.3rem"><span style="color:${fCol(f)}">${f}</span><span>€ ${fmt(v)} <span class="tag">${fmtP(T?v/T*100:0)}</span></span></div><div class="br-trk" style="height:5px"><div class="br-fil" style="width:${Math.round(v/mxF*100)}%;background:${fCol(f)}"></div></div></div>`}).join('');
  renderProd();
}
function renderProd(){
  const fc=document.getElementById('an-fcat')?.value||'';let R=fR(document.getElementById('an-year')?.value||'',document.getElementById('an-month')?.value);if(fc)R=R.filter(r=>r.cat===fc);
  const T=sumV(fR(document.getElementById('an-year')?.value||'',document.getElementById('an-month')?.value),'val');
  const rows=Object.entries(grp(R,'mat')).map(([mat,rr])=>({mat,cat:rr[0].cat,for:rr[0].fornitore,v:sumV(rr,'val')})).sort((a,b)=>b.v-a.v);
  const mxP=rows[0]?.v||1;
  document.getElementById('an-prod').innerHTML=rows.map(p=>`<tr><td>${p.mat}</td><td><span class="tag">${p.cat}</span></td><td>${p.for.split(' ')[0]}</td><td style="color:var(--gold)">€ ${fmt(p.v)}</td><td><span class="tag">${fmtP(T?p.v/T*100:0)}</span></td><td><div class="br-trk" style="height:5px"><div class="br-fil" style="width:${Math.round(p.v/mxP*100)}%;background:${cCol(p.cat)}"></div></div></td></tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:1.5rem">Nessun prodotto.</td></tr>';
}

// ═══════════════════════════════════
// EXPORT
// ═══════════════════════════════════
function acw(ws,d){const c=d[0]?.length||0,w=Array(c).fill(8);d.forEach(r=>r.forEach((v,i)=>{const l=(v+'').length;if(l>w[i])w[i]=Math.min(l+2,50)}));ws['!cols']=w.map(wch=>({wch}))}
function exportBolle(){const wb=XLSX.utils.book_new();const d=[['N.Doc','Data','Fornitore','Totale','Fonte']];BOLLE.forEach(b=>d.push([b.num,b.data,b.fornitore,b.totale,b.fonte]));const ws=XLSX.utils.aoa_to_sheet(d);acw(ws,d);XLSX.utils.book_append_sheet(wb,ws,'Bolle');XLSX.writeFile(wb,'Bolle.xlsx')}
function exportGiac(){const d=[['Articolo','Categoria','Qtà','UM','Prezzo medio','Valore']];const R=fR('','');Object.entries(grp(R,'mat')).forEach(([mat,rr])=>d.push([mat,rr[0].cat,sumV(rr,'qty'),rr[0].unit,sumV(rr,'price')/rr.length,sumV(rr,'val')]));const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(d);acw(ws,d);XLSX.utils.book_append_sheet(wb,ws,'Giacenze');XLSX.writeFile(wb,'Giacenze.xlsx')}
function exportAnn(){const year=document.getElementById('a-year')?.value||new Date().getFullYear();const d=[['Mese','Totale']];for(let m=1;m<=12;m++)d.push([MESI[m-1],sumV(fR(year,m),'val')]);const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(d);acw(ws,d);XLSX.utils.book_append_sheet(wb,ws,'Annuale');XLSX.writeFile(wb,'Annuale_'+year+'.xlsx')}
function exportPivot(){const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet([['Pivot']]);XLSX.utils.book_append_sheet(wb,ws,'Pivot');XLSX.writeFile(wb,'Pivot.xlsx')}
function exportAnal(){const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet([['Analisi']]);XLSX.utils.book_append_sheet(wb,ws,'Analisi');XLSX.writeFile(wb,'Analisi.xlsx')}

function showModal(t,b,cb){document.getElementById('mod-t').textContent=t;document.getElementById('mod-b').innerHTML=b;document.getElementById('mod-ok').onclick=()=>{cb();closeModal()};document.getElementById('modal').classList.add('on')}
function closeModal(){document.getElementById('modal').classList.remove('on')}

buildHTML();
updateStatus(window.BOLLE.length, true);
goV('dash');
