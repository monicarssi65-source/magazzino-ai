<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagazzinoAI • Ristorazione v2.5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --gold: #C9A84C;
  --gold-l: #E8D5A3;
  --dark: #1A1410;
  --dark2: #2A2018;
  --cream: #F5EDD8;
  --text: #2A1F0E;
  --muted: #7A6A55;
}
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: 'DM Mono', monospace; background: var(--dark); color: var(--cream); }
.app-shell { display: flex; min-height: 100vh; }
.sidebar { width: 260px; background: var(--dark2); padding: 1.8rem 1rem; border-right: 1px solid rgba(201,168,76,0.3); }
.main { flex: 1; padding: 2rem; overflow: auto; }
.card { background: var(--dark2); border: 1px solid rgba(201,168,76,0.3); border-radius: 10px; padding: 1.6rem; margin-bottom: 1.5rem; }
.card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; color: var(--gold); margin-bottom: 1rem; }
.btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--gold); color: #1A1410; }
.btn-green { background: #4ade80; color: #111; }
.btn-red { background: #e74c3c; color: white; }
.riga-row { padding: 14px 0; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; }
.tag { font-size: 11px; padding: 4px 9px; background: rgba(201,168,76,0.2); border-radius: 4px; color: var(--gold-l); }
</style>
</head>
<body>

<div class="app-shell">
  <nav class="sidebar">
    <h2 style="color:var(--gold)">MagazzinoAI</h2>
    <p style="color:#aaa">v2.5 • Completa</p>
    
    <button onclick="showPage('scanner')" style="width:100%;text-align:left;padding:12px;margin:6px 0">📷 Carica Bolla</button>
    <button onclick="showPage('bolle')" style="width:100%;text-align:left;padding:12px;margin:6px 0">📋 Archivio Bolle</button>
    <button onclick="showPage('giacenze')" style="width:100%;text-align:left;padding:12px;margin:6px 0">📦 Giacenze</button>
    <button onclick="showPage('annuale')" style="width:100%;text-align:left;padding:12px;margin:6px 0">📅 Vista Annuale</button>
    <button onclick="showPage('pivot')" style="width:100%;text-align:left;padding:12px;margin:6px 0">🔲 Pivot</button>
    <button onclick="showPage('analisi')" style="width:100%;text-align:left;padding:12px;margin:6px 0">📈 Analisi</button>
  </nav>

  <main class="main">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <h1>Dashboard</h1>
      <div class="card">
        <div class="card-title">Riepilogo Generale</div>
        <div id="dash-metrics"></div>
      </div>
      <div class="card">
        <div class="card-title">Ultime Bolle</div>
        <div id="dash-recent"></div>
      </div>
    </div>

    <!-- CARICA BOLLA -->
    <div class="page" id="page-scanner">
      <h1>📷 Carica Nuova Bolla</h1>
      
      <div class="card">
        <div class="card-title">Dati Documento</div>
        <input id="in-num" placeholder="N. DDT / Fattura" style="width:100%;padding:14px;margin-bottom:10px">
        <input id="in-data" type="date" style="width:100%;padding:14px;margin-bottom:10px">
        <input id="in-for" placeholder="Fornitore" style="width:100%;padding:14px">
      </div>

      <div class="card">
        <div class="card-title">Carica Foto Bolla</div>
        <button onclick="document.getElementById('file-image').click()" class="btn btn-primary" style="width:100%">🖼️ Foto Bolla + Claude AI</button>
        <input type="file" id="file-image" accept="image/*" style="display:none" onchange="handleImageWithClaude(event)">
      </div>

      <div class="card">
        <div class="card-title">Righe Bolla (<span id="righe-count">0</span>)</div>
        <div id="righe-list"></div>
      </div>

      <div style="margin:20px 0">
        <button class="btn btn-primary" onclick="valorizzaAI()">✦ Analizza con Claude AI</button>
        <button class="btn btn-green" onclick="salvaBollaManuale()">💾 Salva Bolla</button>
      </div>
    </div>

    <!-- ARCHIVIO BOLLE (con modifica) -->
    <div class="page" id="page-bolle">
      <h1>Archivio Bolle</h1>
      <div class="card" id="bolle-list"></div>
    </div>

    <!-- GIACENZE -->
    <div class="page" id="page-giacenze">
      <h1>Giacenze Valorizzate</h1>
      <div class="card" id="giacenze-list"></div>
    </div>

    <!-- VISTA ANNUALE -->
    <div class="page" id="page-annuale">
      <h1>Vista Annuale</h1>
      <div class="card">
        <div class="card-title">Andamento Mensile</div>
        <div id="ann-chart"></div>
      </div>
      <div class="card" id="ann-table-card"></div>
    </div>

    <!-- PIVOT -->
    <div class="page" id="page-pivot">
      <h1>Tabella Pivot</h1>
      <div class="card">
        <div class="card-title" id="pivot-title">Pivot Valori</div>
        <div style="overflow-x:auto"><table class="pivot-table" id="pivot-table"></table></div>
      </div>
    </div>

    <!-- ANALISI -->
    <div class="page" id="page-analisi">
      <h1>Analisi Acquisti</h1>
      <div class="card" id="analisi-content"></div>
    </div>

  </main>
</div>

<script>
// ====================== FIREBASE ======================
const firebaseConfig = {
  apiKey: "AIzaSyAhtBZ-UIokFLr905fgwcRGmNJlKMUdew8",
  authDomain: "hotel-derby-reception.firebaseapp.com",
  projectId: "hotel-derby-reception",
  storageBucket: "hotel-derby-reception.firebasestorage.app",
  messagingSenderId: "10481064334",
  appId: "1:10481064334:web:1f97bea596d1ea03086cdf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const bolleRef = db.collection('magazzino_bolle');

let BOLLE = [];
let currentRighe = [];
let editingBollaId = null;

// ====================== CLAUDE VISION ======================
async function handleImageWithClaude(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const base64 = ev.target.result.split(',')[1];

    try {
      alert("📤 Invio foto a Claude Sonnet 4-6...");

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": "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",   // ← SOSTITUISCI
          "anthropic-version": "2023-06-01"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 2000,
          temperature: 0.2,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: file.type, data: base64 }},
              { type: "text", text: `Estrai tutti gli articoli dalla bolla. Restituisci SOLO JSON valido.` }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = data.content[0].text;
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      const parsed = JSON.parse(jsonMatch[0]);

      currentRighe = parsed.righe.map(r => ({
        mat: r.mat,
        cat: "Da definire",
        qty: r.qty,
        unit: r.unit || "PZ",
        price: r.price || 0,
        val: parseFloat((r.qty * (r.price || 0)).toFixed(2))
      }));

      renderRigheList();
      alert(`✅ Estratti ${currentRighe.length} articoli dalla foto!`);

    } catch (err) {
      alert("❌ Errore: " + err.message);
    }
  };
  reader.readAsDataURL(file);
}

// ====================== SALVATAGGIO ======================
async function salvaBollaManuale() {
  if (currentRighe.length === 0) return alert("Aggiungi almeno una riga");

  const bolla = {
    num: document.getElementById('in-num').value || `DDT-${Date.now()}`,
    data: document.getElementById('in-data').value || new Date().toISOString().slice(0,10),
    fornitore: document.getElementById('in-for').value || "Fornitore",
    totale: currentRighe.reduce((s,r) => s + r.val, 0),
    fonte: "manuale",
    righe: currentRighe,
    created: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await bolleRef.add(bolla);
    alert("✅ Bolla salvata!");
    currentRighe = [];
    renderRigheList();
    loadBolle();
  } catch (e) {
    alert("Errore: " + e.message);
  }
}

function renderRigheList() {
  document.getElementById('righe-count').textContent = currentRighe.length;
  let html = currentRighe.map(r => `
    <div class="riga-row">
      <div><strong>${r.mat}</strong></div>
      <div>${r.qty} \( {r.unit} × € \){r.price} = <strong>€${r.val}</strong></div>
    </div>
  `).join('');
  document.getElementById('righe-list').innerHTML = html || '<p style="color:#888">Nessuna riga</p>';
}

// ====================== AVVIO ======================
loadBolle();
</script>
</body>
</html>
